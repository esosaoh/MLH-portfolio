{% extends "base.html" %}

{% block content %}
<section class="animate-fade-up pt-16 sm:pt-20">
    <h1 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">Hobbies</h1>
    <p class="mt-2 text-zinc-400">What I get up to outside of work.</p>
</section>

<div class="animate-fade-up mt-10 grid gap-4 sm:grid-cols-2 [animation-delay:120ms]">
    {% for hobby in hobbies %}
    <div class="overflow-hidden rounded-xl border border-zinc-800 bg-zinc-900/40 transition-colors hover:border-zinc-700">
        {% if hobby.image %}
        <img src="{{ url_for('static', filename=hobby.image) }}" alt="{{ hobby.name }}"
             class="aspect-[3/2] w-full object-cover">
        {% else %}
        <div class="flex aspect-[3/2] w-full items-center justify-center bg-[radial-gradient(circle_at_30%_20%,rgba(99,102,241,0.15),transparent_60%)] text-4xl font-bold text-indigo-400">
            {{ hobby.name[0] }}
        </div>
        {% endif %}
        <h2 class="border-t border-zinc-800 px-5 py-3.5 text-sm font-semibold text-zinc-100">{{ hobby.name }}</h2>
    </div>
    {% endfor %}
</div>
{% endblock %}
